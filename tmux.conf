# Quick pane cycling
bind Tab last-window
bind Space last-pane

# Clear screen and history
bind C-l send-keys 'C-l'

# Kill pane/window confirmations
bind x kill-pane
bind X kill-window
bind Q confirm-before -p "kill-session #S? (y/n)" kill-session

# Layout Management
# =====================================

# Predefined Layout Shortcuts (using 'o' prefix to avoid conflicts)
# bind M-1 select-layout even-horizontal \; display-message "Layout: Even Horizontal"
# bind M-2 select-layout even-vertical \; display-message "Layout: Even Vertical"
# bind M-3 select-layout main-horizontal \; display-message "Layout: Main Horizontal"
# bind M-4 select-layout main-vertical \; display-message "Layout: Main Vertical"
# bind M-5 select-layout tiled \; display-message "Layout: Tiled"

# Layout cycling and management
# bind o select-layout -o \; display-message "Next Layout"
# bind O select-layout -E \; display-message "Previous Layout"

# Custom layout presets (using single characters)
# Development layout: main vertical with side panels
bind D new-window -n "dev" \; split-window -h -p 30 \; split-window -v -p 50 \; select-pane -L

# Monitoring layout: 4-pane grid
bind M new-window \; rename-window monitoring \; split-window -h \; split-window -v \; select-pane -L \; split-window -v \; select-pane -U \; display-message "Layout: Monitoring (4-Pane Grid)"

# Wide terminal layout: top main, bottom split
bind W new-window -n "dev" \; split-window -h -p 25 \; select-pane -L
# bind W split-window -v -p 25 \; split-window -h \; select-pane -U \; display-message "Layout: Wide Terminal (Top Main, Bottom Split)"

# Side-by-side layout: two equal vertical panes
# bind S split-window -h \; display-message "Layout: Side-by-Side"

# Triple column layout
bind T split-window -h -p 33 \; split-window -h -p 50 \; select-pane -L \; select-pane -L \; display-message "Layout: Triple Column"

# Layout utilities
bind M-r rotate-window \; display-message "Window Rotated"
bind M-s swap-pane -U \; display-message "Pane Swapped Up"
bind M-d swap-pane -D \; display-message "Pane Swapped Down"

# Pane synchronization toggle
bind e setw synchronize-panes \; display-message "Pane synchronization: #{?pane_synchronized,ON,OFF}"

# Zoom toggle with visual feedback
bind z resize-pane -Z \; display-message "Pane zoom: #{?window_zoomed_flag,ON,OFF}"

# Quick window layouts for specific workflows (using 'W' for workspace)
# Full-stack development: editor + terminal + logs
# bind W new-window -n "dev" \; split-window -h -p 30 \; split-window -v -p 50 \; select-pane -L \; display-message "Workspace: Full-Stack Development"

# Alternative workspace layouts (using combinations with 'W')
bind C-w split-window -h -p 30 \; split-window -v -p 50 \; select-pane -L \; display-message "Layout: Development Workspace"

# System monitoring layout in current window
bind M-w new-window -n "dev" \; split-window -h \; send-keys 'htop' Enter \; split-window -v \; send-keys 'tail -f /var/log/messages 2>/dev/null || tail -f /var/log/syslog 2>/dev/null || echo "No system log found"' Enter \; select-pane -L \; display-message "Layout: System Monitor"

# Git workflow layout in current window  
bind M-g split-window -h \; send-keys 'git status' Enter \; split-window -v \; send-keys 'git log --oneline --decorate -10' Enter \; select-pane -L \; display-message "Layout: Git Workflow"

# Layout save/restore (requires tmux-resurrect plugin)
bind C-s run-shell '~/.tmux/plugins/tmux-resurrect/scripts/save.sh' \; display-message "Layout Saved"
bind C-r run-shell '~/.tmux/plugins/tmux-resurrect/scripts/restore.sh' \; display-message "Layout Restored"

# Appearance & Status Bar
# =====================================

# Status bar position
set -g status-position bottom

# Status bar colors and style
set -g status-bg colour235
set -g status-fg colour136
set -g status-left-length 30
set -g status-right-length 150
set -g status-interval 1

# Status bar content (enhanced with layout info)
set -g status-left '#[fg=colour233,bg=colour245,bold] #S #[fg=colour245,bg=colour235,nobold]'
set -g status-right '#[fg=colour240,bg=colour235]#[fg=colour136,bg=colour240] #{window_layout} #[fg=colour250,bg=colour240] %Y-%m-%d #[fg=colour252,bg=colour240,nobold]#[fg=colour235,bg=colour252,bold] %H:%M '

# Window status (enhanced with layout indicator)
setw -g window-status-format '#[fg=colour235,bg=colour235]#[default] #I #W #[fg=colour235,bg=colour235]'
setw -g window-status-current-format '#[fg=colour235,bg=colour136]#[fg=colour235,bg=colour136,noreverse,bold] #I #W #[fg=colour136,bg=colour235,nobold]'

# Pane borders
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour136

# Message colors
set -g message-style fg=colour136,bg=colour235,bold
set -g message-command-style fg=colour136,bg=colour235,bold

# Clock mode
setw -g clock-mode-colour colour136
setw -g clock-mode-style 24

# Plugin Configuration
# =====================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'      # Save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'      # Auto-save sessions
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # Show prefix key

# Plugin settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Enhanced resurrect settings for layout preservation
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-save-shell-history 'on'

# Yank settings (adjust for your OS)
# For macOS:
set -g @yank_selection_mouse 'clipboard'
# For Linux:
# set -g @yank_selection 'primary'
# set -g @yank_selection_mouse 'clipboard'

# Source additional config files
# =====================================
# Uncomment if you have additional config files
source-file ~/.config/tmux/custom/statusline.conf
# source-file ~/.config/tmux/custom/keybindings.conf

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
